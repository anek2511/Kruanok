<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แป้นพิมพ์มือถือเพื่อผู้ป่วย (แก้ไขแล้ว)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* บล็อกระบบ iOS/Android ไม่ให้เกิดอาการหน่วงหรือซูม */
        .mobile-safe {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; /* บล็อกการดับเบิ้ลแท็บซูม ทำให้กดติดเร็วขึ้น */
        }
        ::-webkit-scrollbar { width: 0px; }
        
        .active-tab {
            background-color: #f59e0b !important;
            color: #0f172a !important;
        }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans h-screen flex flex-col p-3 mobile-safe overflow-hidden">

    <div class="flex-none mb-3">
        <div id="output-container" class="bg-slate-900 border-4 border-amber-500 rounded-2xl p-4 h-[120px] overflow-y-auto flex items-center justify-between shadow-lg">
            <p id="output-text" class="text-3xl font-bold text-amber-400 break-all leading-relaxed">
                👉 แตะเพื่อพิมพ์...
            </p>
            <button id="btn-clear" class="ml-2 bg-red-600 active:bg-red-800 text-white font-bold py-3 px-4 rounded-xl text-lg shrink-0 shadow-md">
                ลบหมด
            </button>
        </div>
    </div>

    <div class="flex-none grid grid-cols-3 gap-2 mb-3">
        <button id="btn-speak" class="bg-emerald-600 active:bg-emerald-800 text-white font-bold py-4 rounded-xl text-xl flex items-center justify-center gap-1 shadow-md border-b-4 border-emerald-800">
            🔊 พูด
        </button>
        <button id="btn-space" class="bg-blue-600 active:bg-blue-800 text-white font-bold py-4 rounded-xl text-xl shadow-md border-b-4 border-blue-800">
            ⏵ เว้นวรรค
        </button>
        <button id="btn-back" class="bg-orange-600 active:bg-orange-800 text-white font-bold py-4 rounded-xl text-xl shadow-md border-b-4 border-orange-800">
            ⌫ ลบ
        </button>
    </div>

    <div class="flex-none flex gap-1 overflow-x-auto pb-2 mb-2 bg-slate-900 p-1 rounded-xl">
        <button id="tab-0" class="active-tab bg-slate-800 text-white font-bold py-2 px-4 rounded-lg text-lg shrink-0">ก - ณ</button>
        <button id="tab-1" class="bg-slate-800 text-white font-bold py-2 px-4 rounded-lg text-lg shrink-0">ด - ฝ</button>
        <button id="tab-2" class="bg-slate-800 text-white font-bold py-2 px-4 rounded-lg text-lg shrink-0">พ - ฮ</button>
        <button id="tab-3" class="bg-slate-800 text-white font-bold py-2 px-4 rounded-lg text-lg shrink-0">สระ/วรรณยุกต์</button>
    </div>

    <div class="flex-1 overflow-y-auto bg-slate-900 p-3 rounded-2xl border border-slate-800">
        <div id="keyboard-grid" class="grid grid-cols-4 gap-3">
            </div>
    </div>

    <script>
        const letterGroups = [
            ['ก', 'ข', 'ฃ', 'ค', 'ฅ', 'ฆ', 'ง', 'จ', 'ฉ', 'ช', 'ซ', 'ฌ', 'ญ', 'ฎ', 'ฏ', 'ฐ', 'ฑ', 'ฒ', 'ณ'],
            ['ด', 'ต', 'ถ', 'ท', 'ธ', 'น', 'บ', 'ป', 'ผ', 'ฝ'],
            ['พ', 'ฟ', 'ภ', 'ม', 'ย', 'ร', 'ล', 'ว', 'ศ', 'ษ', 'ส', 'ห', 'ฬ', 'อ', 'ฮ', 'ฯ'],
            ['ะ', 'า', 'ิ', 'ี', 'ึ', 'ื', 'ุ', 'ู', 'เ', 'แ', 'โ', 'ใ', 'ไ', 'ำ', 'ั', '็', '่', '้', '๊', '๋', '์']
        ];

        let currentTab = 0;
        let currentText = "";
        
        const outputTextEl = document.getElementById('output-text');
        const keyboardGrid = document.getElementById('keyboard-grid');

        // ฟังก์ชันเปลี่ยนหมวดหมู่
        function changeTab(tabIndex) {
            document.getElementById(`tab-${currentTab}`).classList.remove('active-tab');
            currentTab = tabIndex;
            document.getElementById(`tab-${currentTab}`).add('active-tab');
            renderKeyboard();
        }

        // ลงทะเบียนเหตุการณ์ให้ปุ่มแท็บด้วยวิธีที่เสถียรที่สุด
        for (let i = 0; i < 4; i++) {
            const tab = document.getElementById(`tab-${i}`);
            tab.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                document.getElementById(`tab-${currentTab}`).classList.remove('active-tab');
                currentTab = i;
                tab.classList.add('active-tab');
                renderKeyboard();
            });
        }

        // ฟังก์ชันสร้างปุ่มคีย์บอร์ด
        function renderKeyboard() {
            keyboardGrid.innerHTML = "";
            const keys = letterGroups[currentTab];
            
            keys.forEach(key => {
                const button = document.createElement('button');
                button.innerText = key;
                button.className = "bg-amber-100 active:bg-amber-400 text-slate-950 font-black text-4xl p-5 rounded-2xl flex items-center justify-center shadow-md border-b-4 border-amber-300 transform active:translate-y-0.5 active:border-b-0 select-none";
                
                // ใช้ pointerdown เพื่อให้รองรับทั้ง นิ้วมือ สไตลัส และเมาส์ บนมือถือทุกระบบ
                button.addEventListener('pointerdown', (e) => {
                    e.preventDefault(); // ป้องกันอาการหน่วงและการซูมหน้าจอ
                    pressKey(key);
                });

                keyboardGrid.appendChild(button);
            });
        }

        function pressKey(char) {
            currentText += char;
            updateDisplay();
        }

        function backspace() {
            currentText = currentText.slice(0, -1);
            updateDisplay();
        }

        function clearAll() {
            currentText = "";
            updateDisplay();
        }

        function updateDisplay() {
            if (currentText === "") {
                outputTextEl.innerText = "👉 แตะเพื่อพิมพ์...";
                outputTextEl.classList.add('text-slate-500');
                outputTextEl.classList.remove('text-amber-400');
            } else {
                outputTextEl.innerText = currentText;
                outputTextEl.classList.remove('text-slate-500');
                outputTextEl.classList.add('text-amber-400');
            }
            const container = document.getElementById('output-container');
            container.scrollTop = container.scrollHeight;
        }

        function speakText() {
            if (currentText.trim() === "") return;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(currentText);
                utterance.lang = 'th-TH';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        // ผูกฟังก์ชันเข้ากับปุ่มควบคุมหลัก
        document.getElementById('btn-clear').addEventListener('pointerdown', (e) => { e.preventDefault(); clearAll(); });
        document.getElementById('btn-speak').addEventListener('pointerdown', (e) => { e.preventDefault(); speakText(); });
        document.getElementById('btn-space').addEventListener('pointerdown', (e) => { e.preventDefault(); pressKey(' '); });
        document.getElementById('btn-back').addEventListener('pointerdown', (e) => { e.preventDefault(); backspace(); });

        // ป้องกันไม่ให้หน้าจอมือถือขยับเวลานิ้วปัด
        document.addEventListener('touchmove', function (e) {
            if (!e.target.closest('#keyboard-grid') && !e.target.closest('#output-container')) {
                e.preventDefault();
            }
        }, { passive: false });

        renderKeyboard();
    </script>
</body>
</html>
